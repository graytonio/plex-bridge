name: Publish

# Publishes a new Docker image to ghcr.io whenever a version tag is pushed.
# Tag format: v<semver>  e.g. v0.1.0, v1.2.3
#
# The image is pushed with three tags:
#   ghcr.io/<owner>/<repo>:1.2.3   (exact version)
#   ghcr.io/<owner>/<repo>:1.2     (minor)
#   ghcr.io/<owner>/<repo>:1       (major)
#   ghcr.io/<owner>/<repo>:latest  (for non-prerelease tags only)

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Run the full test suite before building the image so a bad tag can't
  # publish a broken release.
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache Docker layers in GitHub Actions cache to speed up Rust builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
