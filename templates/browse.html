{% extends "base.html" %}
{% block title %} — Browse{% endblock %}
{% block content %}
<h1 class="page-title">Browse Library</h1>

<div class="tab-bar">
  <div class="tab {% if tab == "movies" %}active{% endif %}"
    hx-get="/browse/movies"
    hx-target="#browse-content"
    hx-swap="innerHTML"
    onclick="setTab(this)">Movies</div>
  <div class="tab {% if tab == "shows" %}active{% endif %}"
    hx-get="/browse/shows"
    hx-target="#browse-content"
    hx-swap="innerHTML"
    onclick="setTab(this)">TV Shows</div>
</div>

<div id="browse-content"
  hx-get="/browse/movies"
  hx-trigger="load"
  hx-swap="innerHTML">
  <div class="browse-loading">Loading…</div>
</div>

<script>
function setTab(el) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
}
function toggleShow(header) {
  var item = header.closest('.show-item');
  var panel = item.querySelector('.show-episodes');
  var arrow = header.querySelector('.show-arrow');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    if (arrow) arrow.innerHTML = '&#9660;';
  } else {
    panel.style.display = 'none';
    if (arrow) arrow.innerHTML = '&#9658;';
  }
}
</script>
{% endblock %}
