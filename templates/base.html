<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlexBridge{% block title %} — Dashboard{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
    a { color: #e5a00d; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav { background: #16213e; padding: 12px 24px; display: flex; align-items: center; gap: 24px; border-bottom: 1px solid #0f3460; }
    .nav-brand { font-size: 1.2rem; font-weight: 700; color: #e5a00d; }
    .nav-link { color: #aaa; padding: 6px 12px; border-radius: 4px; }
    .nav-link:hover, .nav-link.active { background: #0f3460; color: #e0e0e0; text-decoration: none; }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .page-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; color: #e5a00d; }

    /* Cards */
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: #ccc; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; font-weight: 500; }
    .btn-primary { background: #e5a00d; color: #1a1a2e; }
    .btn-primary:hover { background: #f5b020; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #e74c3c; }
    .btn-secondary { background: #0f3460; color: #e0e0e0; }
    .btn-secondary:hover { background: #1a4a80; }
    .btn-sm { padding: 4px 10px; font-size: 0.8rem; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-gray { background: #555; color: #ccc; }
    .badge-blue { background: #1e6a9e; color: #9ecfef; }
    .badge-green { background: #1a6b3a; color: #7ddb9c; }
    .badge-red { background: #7b1f1f; color: #f99; }
    .badge-yellow { background: #7a5a00; color: #ffd84d; }

    /* Stats bar */
    .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 12px 20px; }
    .stat-num { font-size: 1.8rem; font-weight: 700; color: #e5a00d; }
    .stat-label { font-size: 0.8rem; color: #888; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 12px; text-align: left; font-size: 0.8rem; font-weight: 600; color: #888; border-bottom: 1px solid #0f3460; }
    td { padding: 10px 12px; font-size: 0.875rem; border-bottom: 1px solid #1a2a4a; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #0f1e38; }

    /* Progress bar */
    .progress-bar { background: #0f3460; border-radius: 4px; height: 6px; overflow: hidden; width: 120px; display: inline-block; }
    .progress-fill { background: #e5a00d; height: 100%; transition: width 0.3s; }
    .progress-text { font-size: 0.75rem; color: #888; margin-left: 6px; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 4px; font-size: 0.875rem; color: #bbb; }
    .form-input { width: 100%; padding: 8px 12px; background: #0f1e38; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 0.875rem; }
    .form-input:focus { outline: none; border-color: #e5a00d; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-hint { font-size: 0.75rem; color: #666; margin-top: 4px; }

    /* Alert */
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 0.875rem; }
    .alert-success { background: #1a4a2a; border: 1px solid #2d7a4a; color: #7ddb9c; }
    .alert-error { background: #4a1a1a; border: 1px solid #7a2d2d; color: #f99; }

    /* Test result */
    .test-result { padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; margin-top: 8px; }
    .test-result.success { background: #1a4a2a; color: #7ddb9c; }
    .test-result.error { background: #4a1a1a; color: #f99; }

    /* Tab bar */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab { padding: 8px 20px; border-radius: 4px 4px 0 0; cursor: pointer; border: 1px solid #0f3460; border-bottom: none; color: #888; }
    .tab.active, .tab:hover { background: #16213e; color: #e5a00d; }

    /* Movie grid */
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .movie-card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; overflow: hidden; position: relative; }
    .movie-card.synced { border-color: #2d7a4a; }
    .movie-poster { width: 100%; aspect-ratio: 2/3; background: #0f1e38; object-fit: cover; }
    .movie-poster-placeholder { width: 100%; aspect-ratio: 2/3; background: #0f1e38; display: flex; align-items: center; justify-content: center; color: #333; font-size: 2rem; }
    .movie-info { padding: 8px; }
    .movie-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 2px; line-height: 1.3; }
    .movie-meta { font-size: 0.72rem; color: #888; }
    .synced-badge { position: absolute; top: 6px; right: 6px; background: #1a6b3a; color: #7ddb9c; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
    .movie-actions { padding: 6px 8px 8px; }

    /* Show list */
    .show-list { display: flex; flex-direction: column; gap: 2px; }
    .show-item { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; }
    .show-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .show-header:hover { background: #0f1e38; }
    .show-title-text { font-weight: 600; flex: 1; }
    .show-meta { font-size: 0.78rem; color: #888; }
    .show-episodes { padding: 0 14px 10px; }
    .season-header { padding: 8px 0; font-weight: 600; color: #e5a00d; font-size: 0.875rem; border-bottom: 1px solid #0f3460; margin-bottom: 4px; }
    .episode-row { padding: 6px 0; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; border-bottom: 1px solid #0f1e38; }
    .episode-num { color: #888; min-width: 44px; font-size: 0.78rem; }
    .episode-title { flex: 1; }
    .episode-size { color: #888; font-size: 0.78rem; min-width: 60px; text-align: right; }

    /* Error tooltip */
    .error-msg { cursor: help; color: #f99; margin-left: 4px; }

    /* htmx indicator */
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-indicator { display: none; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">🎬 PlexBridge</span>
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/browse" class="nav-link">Browse</a>
    <a href="/settings" class="nav-link">Settings</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
