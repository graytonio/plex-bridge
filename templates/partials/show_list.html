<div class="show-list">
{% for show in shows %}
  <div class="show-item">
    <div class="show-header" onclick="toggleShow(this)"
      hx-get="/browse/shows/{{ show.rating_key }}/seasons"
      hx-target="#seasons-{{ show.rating_key }}"
      hx-swap="innerHTML"
      hx-trigger="click once">
      <span>&#128250;</span>
      <span class="show-title-text">{{ show.title }}</span>
      {% if let Some(y) = show.year %}<span class="show-meta">{{ y }}</span>{% endif %}
      {% if let Some(lc) = show.leaf_count %}<span class="show-meta">{{ lc }} ep</span>{% endif %}
      {% if show.is_synced %}<span class="badge badge-green">&#10003;</span>{% endif %}
      <span class="show-arrow" style="color:#555;">&#9658;</span>
    </div>
    <div id="seasons-{{ show.rating_key }}" class="show-episodes" style="display:none;"></div>
  </div>
{% endfor %}
{% if shows.is_empty() %}
<p style="color:#666;text-align:center;padding:40px 0;">
  No shows found. Check your home server in <a href="/settings">Settings</a>.
</p>
{% endif %}
</div>
<script>
function toggleShow(header) {
  var item = header.closest('.show-item');
  var panel = item.querySelector('.show-episodes');
  var arrow = header.querySelector('.show-arrow');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    if (arrow) arrow.innerHTML = '&#9660;';
  } else {
    panel.style.display = 'none';
    if (arrow) arrow.innerHTML = '&#9658;';
  }
}
</script>
